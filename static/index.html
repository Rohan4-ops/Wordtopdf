<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word to PDF Converter</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        .status {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Word to PDF Converter</h2>

    <form id="uploadForm">
        <input type="file" name="file" accept=".docx" required>
        <br>
        <button type="submit">Convert to PDF</button>
    </form>

    <div class="status" id="status"></div>
</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const statusDiv = document.getElementById('status');

    statusDiv.innerHTML = "⏳ Converting...";

    try {
        const response = await fetch('/convert', {
            method: 'POST',
            body: formData
        });

        if (!response.ok) {
            const err = await response.json();
            statusDiv.innerHTML = "❌ Error: " + err.error;
            return;
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = "converted.pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();

        statusDiv.innerHTML = "✅ Download started!";

    } catch (err) {
        statusDiv.innerHTML = "❌ Something went wrong";
    }
});
</script>

</body>
</html>
